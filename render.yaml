from flask import Flask

app = Flask(__name__)

@app.route("/<int:number>")
def check(number):
    if number % 2 == 0:
        return f"{number} is Even"
    else:
        return f"{number} is Odd"

@app.route("/")
def home():
    return "Use /number in URL. Example: /10"

if __name__ == "__main__":
    app.run(host="0.0.0.0", port=5000)
